<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故宫午门 - 原神风格 3D 动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }

        .loading-text {
            color: white;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 32px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.6);
            z-index: 100;
            letter-spacing: 8px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease-out 1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        #subtitle {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 100;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeIn 2s ease-out 2s forwards;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-text">正在加载故宫午门...</div>
    </div>

    <div id="title">故 宫 午 门</div>
    <div id="subtitle">Genshin Impact Style · Epic 3D Animation</div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/GodRaysShader.js"></script>

    <script>
        // 主场景类
        class ForbiddenCityScene {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                this.composer = null;
                this.gateLeft = null;
                this.gateRight = null;
                this.lightBeam = null;
                this.particles = [];
                this.time = 0;
                
                this.init();
                this.createScene();
                this.animate();
            }

            init() {
                // 创建场景
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

                // 创建相机
                this.camera = new THREE.PerspectiveCamera(
                    60,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                this.camera.position.set(0, 3, 25);

                // 创建渲染器
                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: true,
                    alpha: true 
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                
                document.getElementById('canvas-container').appendChild(this.renderer.domElement);

                // 相机控制器
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2.2;
                this.controls.minDistance = 10;
                this.controls.maxDistance = 40;

                // 窗口大小调整
                window.addEventListener('resize', () => this.onWindowResize(), false);
            }

            createScene() {
                this.createLighting();
                this.createGround();
                this.createGate();
                this.createStairs();
                this.createStoneLions();
                this.createParticles();
                this.setupPostProcessing();
                
                // 隐藏加载界面
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 1000);
                }, 1500);
            }

            createLighting() {
                // 环境光
                const ambientLight = new THREE.AmbientLight(0x404060, 0.3);
                this.scene.add(ambientLight);

                // 主光源 - 从门后射出
                this.mainLight = new THREE.PointLight(0xffaa00, 2, 50);
                this.mainLight.position.set(0, 5, -2);
                this.mainLight.castShadow = true;
                this.mainLight.shadow.mapSize.width = 2048;
                this.mainLight.shadow.mapSize.height = 2048;
                this.mainLight.shadow.camera.near = 0.5;
                this.mainLight.shadow.camera.far = 100;
                this.mainLight.shadow.bias = -0.0001;
                this.scene.add(this.mainLight);

                // 补光
                const fillLight1 = new THREE.PointLight(0x6688ff, 0.5, 30);
                fillLight1.position.set(-15, 8, 10);
                this.scene.add(fillLight1);

                const fillLight2 = new THREE.PointLight(0x6688ff, 0.5, 30);
                fillLight2.position.set(15, 8, 10);
                this.scene.add(fillLight2);

                // 顶部聚光灯
                const spotLight = new THREE.SpotLight(0xffddaa, 1.5);
                spotLight.position.set(0, 20, 10);
                spotLight.angle = Math.PI / 6;
                spotLight.penumbra = 0.5;
                spotLight.castShadow = true;
                this.scene.add(spotLight);
            }

            createGround() {
                // 地面 - 汉白玉材质
                const groundGeometry = new THREE.PlaneGeometry(100, 100);
                const groundMaterial = new THREE.MeshStandardMaterial({
                    color: 0xf5f5f5,
                    roughness: 0.3,
                    metalness: 0.1,
                    emissive: 0x222222,
                    emissiveIntensity: 0.1
                });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // 平台基座
                const platformGeo = new THREE.BoxGeometry(40, 2, 30);
                const platformMat = new THREE.MeshStandardMaterial({
                    color: 0xe8e8e8,
                    roughness: 0.4,
                    metalness: 0.1
                });
                const platform = new THREE.Mesh(platformGeo, platformMat);
                platform.position.y = -1;
                platform.receiveShadow = true;
                this.scene.add(platform);
            }

            createGate() {
                const gateGroup = new THREE.Group();

                // 朱红色门材质
                const doorMaterial = new THREE.MeshStandardMaterial({
                    color: 0x8b1a1a,
                    roughness: 0.4,
                    metalness: 0.3,
                    emissive: 0x330000,
                    emissiveIntensity: 0.2
                });

                // 金色门钉材质
                const nailMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffd700,
                    roughness: 0.2,
                    metalness: 0.9,
                    emissive: 0xffaa00,
                    emissiveIntensity: 0.3
                });

                // 左门
                this.gateLeft = new THREE.Group();
                const leftDoorGeo = new THREE.BoxGeometry(6, 10, 0.5);
                const leftDoor = new THREE.Mesh(leftDoorGeo, doorMaterial);
                leftDoor.castShadow = true;
                leftDoor.receiveShadow = true;
                this.gateLeft.add(leftDoor);

                // 左门门钉 (9 行 5 列)
                for (let row = 0; row < 9; row++) {
                    for (let col = 0; col < 5; col++) {
                        const nailGeo = new THREE.SphereGeometry(0.15, 16, 16);
                        const nail = new THREE.Mesh(nailGeo, nailMaterial);
                        nail.position.set(
                            -2 + col * 1.0,
                            4 - row * 1.1,
                            0.26
                        );
                        this.gateLeft.add(nail);
                    }
                }

                // 右门
                this.gateRight = new THREE.Group();
                const rightDoorGeo = new THREE.BoxGeometry(6, 10, 0.5);
                const rightDoor = new THREE.Mesh(rightDoorGeo, doorMaterial);
                rightDoor.position.x = 6.25;
                rightDoor.castShadow = true;
                rightDoor.receiveShadow = true;
                this.gateRight.add(rightDoor);

                // 右门门钉
                for (let row = 0; row < 9; row++) {
                    for (let col = 0; col < 5; col++) {
                        const nailGeo = new THREE.SphereGeometry(0.15, 16, 16);
                        const nail = new THREE.Mesh(nailGeo, nailMaterial);
                        nail.position.set(
                            6.25 - 2 + col * 1.0,
                            4 - row * 1.1,
                            0.26
                        );
                        this.gateRight.add(nail);
                    }
                }

                // 门框
                const frameMaterial = new THREE.MeshStandardMaterial({
                    color: 0x8b1a1a,
                    roughness: 0.3,
                    metalness: 0.4
                });

                // 上门框
                const topFrameGeo = new THREE.BoxGeometry(13, 1, 1);
                const topFrame = new THREE.Mesh(topFrameGeo, frameMaterial);
                topFrame.position.y = 5.5;
                topFrame.castShadow = true;
                gateGroup.add(topFrame);

                // 左门框柱
                const leftPillarGeo = new THREE.CylinderGeometry(0.4, 0.5, 12, 16);
                const leftPillar = new THREE.Mesh(leftPillarGeo, frameMaterial);
                leftPillar.position.set(-6.5, 5, 0);
                leftPillar.castShadow = true;
                gateGroup.add(leftPillar);

                // 右门框柱
                const rightPillar = new THREE.Mesh(leftPillarGeo, frameMaterial);
                rightPillar.position.set(12.5, 5, 0);
                rightPillar.castShadow = true;
                gateGroup.add(rightPillar);

                // 门匾
                const plaqueGeo = new THREE.BoxGeometry(8, 1.5, 0.3);
                const plaqueMat = new THREE.MeshStandardMaterial({
                    color: 0x1a1a2e,
                    roughness: 0.2,
                    metalness: 0.5,
                    emissive: 0x222244,
                    emissiveIntensity: 0.3
                });
                const plaque = new THREE.Mesh(plaqueGeo, plaqueMat);
                plaque.position.set(3, 7, 0);
                gateGroup.add(plaque);

                // 门匾金字
                const textCanvas = document.createElement('canvas');
                textCanvas.width = 512;
                textCanvas.height = 128;
                const ctx = textCanvas.getContext('2d');
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 512, 128);
                ctx.font = 'bold 80px Microsoft YaHei';
                ctx.fillStyle = '#ffd700';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('午 門', 256, 64);
                
                const textTexture = new THREE.CanvasTexture(textCanvas);
                const textMat = new THREE.SpriteMaterial({ map: textTexture });
                const textSprite = new THREE.Sprite(textMat);
                textSprite.position.set(3, 7, 0.2);
                textSprite.scale.set(7, 1.3, 1);
                gateGroup.add(textSprite);

                gateGroup.position.set(-3, 0, 0);
                this.scene.add(gateGroup);

                // 存储门的初始位置用于动画
                this.gateLeft.position.x = 0;
                this.gateRight.position.x = 0;
            }

            createStairs() {
                const stairMaterial = new THREE.MeshStandardMaterial({
                    color: 0xf0f0f0,
                    roughness: 0.5,
                    metalness: 0.1
                });

                // 创建台阶
                for (let i = 0; i < 5; i++) {
                    const stairGeo = new THREE.BoxGeometry(30, 0.4, 2 - i * 0.3);
                    const stair = new THREE.Mesh(stairGeo, stairMaterial);
                    stair.position.set(0, -1.8 + i * 0.4, 8 + i * 2);
                    stair.receiveShadow = true;
                    stair.castShadow = true;
                    this.scene.add(stair);
                }

                // 栏杆
                const railMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    roughness: 0.3,
                    metalness: 0.2
                });

                for (let side = -1; side <= 1; side += 2) {
                    const railGeo = new THREE.BoxGeometry(0.3, 1, 20);
                    const rail = new THREE.Mesh(railGeo, railMaterial);
                    rail.position.set(side * 16, -1, 15);
                    rail.castShadow = true;
                    this.scene.add(rail);

                    // 栏杆柱子
                    for (let i = 0; i < 6; i++) {
                        const postGeo = new THREE.CylinderGeometry(0.2, 0.25, 1.2, 8);
                        const post = new THREE.Mesh(postGeo, railMaterial);
                        post.position.set(side * 16, -1.4, 8 + i * 3.5);
                        post.castShadow = true;
                        this.scene.add(post);
                    }
                }
            }

            createStoneLions() {
                const lionMaterial = new THREE.MeshStandardMaterial({
                    color: 0xd4d4d4,
                    roughness: 0.6,
                    metalness: 0.1,
                    emissive: 0x1a1a1a,
                    emissiveIntensity: 0.1
                });

                // 简化版石狮 (用几何体组合)
                for (let side = -1; side <= 1; side += 2) {
                    const lionGroup = new THREE.Group();

                    // 身体
                    const bodyGeo = new THREE.BoxGeometry(2, 2.5, 3);
                    const body = new THREE.Mesh(bodyGeo, lionMaterial);
                    body.castShadow = true;
                    lionGroup.add(body);

                    // 头部
                    const headGeo = new THREE.BoxGeometry(1.8, 2, 2);
                    const head = new THREE.Mesh(headGeo, lionMaterial);
                    head.position.set(0, 2, 1);
                    head.castShadow = true;
                    lionGroup.add(head);

                    // 底座
                    const baseGeo = new THREE.BoxGeometry(3, 0.5, 4);
                    const base = new THREE.Mesh(baseGeo, lionMaterial);
                    base.position.y = -1.5;
                    base.castShadow = true;
                    lionGroup.add(base);

                    lionGroup.position.set(side * 12, -0.5, 18);
                    lionGroup.rotation.y = side * 0.2;
                    this.scene.add(lionGroup);
                }
            }

            createParticles() {
                // 创建发光粒子
                const particleCount = 500;
                const particleGeo = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const colors = new Float32Array(particleCount * 3);

                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 30;
                    positions[i * 3 + 1] = Math.random() * 15 - 2;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 20;

                    const color = new THREE.Color();
                    color.setHSL(0.1 + Math.random() * 0.1, 0.8, 0.6 + Math.random() * 0.4);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }

                particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const particleMat = new THREE.PointsMaterial({
                    size: 0.1,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                const particles = new THREE.Points(particleGeo, particleMat);
                this.scene.add(particles);
                this.particles.push(particles);
            }

            setupPostProcessing() {
                // 后期处理
                this.composer = new THREE.EffectComposer(this.renderer);

                const renderPass = new THREE.RenderPass(this.scene, this.camera);
                this.composer.addPass(renderPass);

                // Bloom 效果
                const bloomPass = new THREE.UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    1.5,  // strength
                    0.4,  // radius
                    0.85  // threshold
                );
                bloomPass.strength = 2.0;
                bloomPass.radius = 0.5;
                bloomPass.threshold = 0.6;
                this.composer.addPass(bloomPass);
            }

            animateGate() {
                // 门打开动画
                if (this.time < 5) {
                    const openAmount = Math.min(this.time / 5, 1);
                    const rotateAngle = openAmount * Math.PI / 3;

                    this.gateLeft.rotation.y = -rotateAngle;
                    this.gateRight.rotation.y = rotateAngle;

                    // 光线强度随门打开而增强
                    this.mainLight.intensity = 2 + openAmount * 3;
                    
                    // 创建光束效果
                    if (openAmount > 0.3 && !this.lightBeam) {
                        this.createLightBeam();
                    }
                }
            }

            createLightBeam() {
                // 丁达尔效应光束
                const beamGeo = new THREE.ConeGeometry(3, 15, 32, 1, true);
                const beamMat = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 },
                        color: { value: new THREE.Color(0xffaa00) }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        varying vec3 vPosition;
                        void main() {
                            vUv = uv;
                            vPosition = position;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float time;
                        uniform vec3 color;
                        varying vec2 vUv;
                        varying vec3 vPosition;
                        
                        void main() {
                            float alpha = 0.3 * (1.0 - vUv.y) * (0.8 + 0.2 * sin(time * 2.0 + vUv.y * 10.0));
                            float intensity = 1.0 - smoothstep(0.0, 0.5, vUv.x);
                            intensity *= 1.0 - smoothstep(0.5, 1.0, vUv.x);
                            vec3 finalColor = color * (1.5 + 0.5 * sin(time * 3.0));
                            gl_FragColor = vec4(finalColor, alpha * intensity);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });

                this.lightBeam = new THREE.Mesh(beamGeo, beamMat);
                this.lightBeam.position.set(0, 2, 0);
                this.lightBeam.rotation.x = Math.PI;
                this.scene.add(this.lightBeam);
            }

            updateParticles() {
                this.time += 0.016;

                // 更新粒子
                this.particles.forEach((particle, index) => {
                    const positions = particle.geometry.attributes.position.array;
                    for (let i = 0; i < positions.length; i += 3) {
                        positions[i + 1] += 0.02; // 向上浮动
                        if (positions[i + 1] > 15) {
                            positions[i + 1] = -2;
                        }
                        positions[i] += Math.sin(this.time + i) * 0.01;
                    }
                    particle.geometry.attributes.position.needsUpdate = true;
                });

                // 更新光束
                if (this.lightBeam) {
                    this.lightBeam.material.uniforms.time.value = this.time;
                }
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                if (this.composer) {
                    this.composer.setSize(window.innerWidth, window.innerHeight);
                }
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                this.time += 0.016;
                
                this.animateGate();
                this.updateParticles();
                this.controls.update();
                
                if (this.composer) {
                    this.composer.render();
                } else {
                    this.renderer.render(this.scene, this.camera);
                }
            }
        }

        // 初始化场景
        window.addEventListener('DOMContentLoaded', () => {
            new ForbiddenCityScene();
        });
    </script>
</body>
</html>
